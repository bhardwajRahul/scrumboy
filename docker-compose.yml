version: "3.8"
services:
  scrumboy:
    build: .
    container_name: scrumboy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - BIND_ADDR=:8080
      - DATA_DIR=/data
      - SQLITE_PATH=/data/app.db
      - SQLITE_BUSY_TIMEOUT_MS=5000
      - SQLITE_JOURNAL_MODE=WAL
      - SQLITE_SYNCHRONOUS=FULL
      - MAX_REQUEST_BODY_BYTES=1048576
      - SCRUMBOY_VAPID_PUBLIC_KEY=${SCRUMBOY_VAPID_PUBLIC_KEY:-}
      - SCRUMBOY_VAPID_PRIVATE_KEY=${SCRUMBOY_VAPID_PRIVATE_KEY:-}
      - SCRUMBOY_VAPID_SUBSCRIBER=${SCRUMBOY_VAPID_SUBSCRIBER:-}
      - SCRUMBOY_DEBUG_PUSH=${SCRUMBOY_DEBUG_PUSH:-}
      - SCRUMBOY_SMTP_HOST=${SCRUMBOY_SMTP_HOST:-}
      # Bare passthrough preserves unset vs explicitly empty for SMTP port parsing.
      - SCRUMBOY_SMTP_PORT
      - SCRUMBOY_SMTP_USERNAME=${SCRUMBOY_SMTP_USERNAME:-}
      - SCRUMBOY_SMTP_PASSWORD=${SCRUMBOY_SMTP_PASSWORD:-}
      - SCRUMBOY_SMTP_FROM=${SCRUMBOY_SMTP_FROM:-}
      - SCRUMBOY_SMTP_TLS_MODE=${SCRUMBOY_SMTP_TLS_MODE:-}
      - SCRUMBOY_SMTP_DEBUG=${SCRUMBOY_SMTP_DEBUG:-}
      - SCRUMBOY_PUBLIC_BASE_URL=${SCRUMBOY_PUBLIC_BASE_URL:-}
      - SCRUMBOY_TRUST_PROXY=${SCRUMBOY_TRUST_PROXY:-}
    volumes:
      - ./data:/data
    restart: unless-stopped

