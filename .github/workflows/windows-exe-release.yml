name: Build Windows EXE

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-windows-exe:
    name: Build and smoke-test Windows EXE
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: internal/httpapi/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: internal/httpapi/web
        run: npm ci

      - name: Build frontend
        working-directory: internal/httpapi/web
        run: npm run build

      - name: Test frontend
        working-directory: internal/httpapi/web
        run: npm test

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Test Go
        run: go test ./... -count=1 -timeout=5m

      - name: Prepare artifact names
        id: names
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          $ErrorActionPreference = "Stop"

          $artifactDir = Join-Path $env:RUNNER_TEMP "scrumboy-artifacts"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

          if ($env:GITHUB_EVENT_NAME -eq "release") {
            $tag = $env:RELEASE_TAG
            if ([string]::IsNullOrWhiteSpace($tag)) {
              throw "Release event did not provide a tag name."
            }
            if ($tag.IndexOfAny([System.IO.Path]::GetInvalidFileNameChars()) -ge 0) {
              throw "Release tag '$tag' contains characters that are invalid in Windows filenames."
            }
            $artifactStem = "scrumboy-$tag-windows-amd64"
          } else {
            $artifactStem = "scrumboy-manual-$($env:RUN_NUMBER)-windows-amd64"
          }

          $exePath = Join-Path $artifactDir "$artifactStem.exe"
          $shaPath = "$exePath.sha256"

          "artifact_stem=$artifactStem" >> $env:GITHUB_OUTPUT
          "exe_path=$exePath" >> $env:GITHUB_OUTPUT
          "sha_path=$shaPath" >> $env:GITHUB_OUTPUT

      - name: Build Windows executable
        shell: pwsh
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
          EXE_PATH: ${{ steps.names.outputs.exe_path }}
        run: |
          $ErrorActionPreference = "Stop"
          go build -trimpath -ldflags="-s -w" -o "$env:EXE_PATH" .\cmd\scrumboy

      - name: Smoke-test Windows executable
        shell: pwsh
        env:
          EXE_PATH: ${{ steps.names.outputs.exe_path }}
        run: |
          $ErrorActionPreference = "Stop"

          $runDir = Join-Path $env:RUNNER_TEMP "scrumboy-smoke-run"
          $dataDir = Join-Path $env:RUNNER_TEMP "scrumboy-smoke-data"
          $stdoutLog = Join-Path $env:RUNNER_TEMP "scrumboy-smoke.stdout.log"
          $stderrLog = Join-Path $env:RUNNER_TEMP "scrumboy-smoke.stderr.log"

          Remove-Item -LiteralPath $runDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $dataDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $runDir -Force | Out-Null
          New-Item -ItemType Directory -Path $dataDir -Force | Out-Null

          $env:DATA_DIR = $dataDir
          $env:BIND_ADDR = "127.0.0.1:18080"

          $proc = $null
          try {
            $proc = Start-Process `
              -FilePath $env:EXE_PATH `
              -WorkingDirectory $runDir `
              -RedirectStandardOutput $stdoutLog `
              -RedirectStandardError $stderrLog `
              -WindowStyle Hidden `
              -PassThru

            $healthOk = $false
            for ($attempt = 1; $attempt -le 60; $attempt++) {
              if ($proc.HasExited) {
                throw "Scrumboy exited before /healthz became available. Exit code: $($proc.ExitCode)"
              }

              try {
                $health = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:18080/healthz" -TimeoutSec 2
                if ($health.StatusCode -eq 200) {
                  $healthOk = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }

            if (-not $healthOk) {
              throw "Timed out waiting for /healthz to return HTTP 200."
            }

            $root = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:18080/" -TimeoutSec 10
            if ($root.StatusCode -ne 200) {
              throw "Expected / to return HTTP 200, got HTTP $($root.StatusCode)."
            }

            $dbPath = Join-Path $dataDir "app.db"
            if (-not (Test-Path -LiteralPath $dbPath -PathType Leaf)) {
              throw "Expected SQLite database to be created at '$dbPath'."
            }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              Wait-Process -Id $proc.Id -Timeout 10 -ErrorAction SilentlyContinue
            }

            Write-Host "===== Scrumboy stdout ====="
            if (Test-Path -LiteralPath $stdoutLog) {
              Get-Content -LiteralPath $stdoutLog -Raw
            }
            Write-Host "===== Scrumboy stderr ====="
            if (Test-Path -LiteralPath $stderrLog) {
              Get-Content -LiteralPath $stderrLog -Raw
            }
          }

      - name: Generate SHA256 checksum
        shell: pwsh
        env:
          EXE_PATH: ${{ steps.names.outputs.exe_path }}
          SHA_PATH: ${{ steps.names.outputs.sha_path }}
        run: |
          $ErrorActionPreference = "Stop"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $env:EXE_PATH).Hash.ToLowerInvariant()
          $fileName = Split-Path -Leaf $env:EXE_PATH
          Set-Content -LiteralPath $env:SHA_PATH -Value "$hash  $fileName" -Encoding ASCII

      - name: Upload executable artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.names.outputs.artifact_stem }}.exe
          path: ${{ steps.names.outputs.exe_path }}
          if-no-files-found: error
          archive: false

      - name: Upload checksum artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.names.outputs.artifact_stem }}.exe.sha256
          path: ${{ steps.names.outputs.sha_path }}
          if-no-files-found: error
          archive: false

  upload-release-assets:
    name: Attach assets to GitHub Release
    if: github.event_name == 'release'
    needs: build-windows-exe
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
      id-token: write
      attestations: write

    steps:
      - name: Download executable artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Resolve release assets
        id: resolve
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $assetDir = Join-Path $env:RUNNER_TEMP "release-assets"
          $exeFiles = @(Get-ChildItem -LiteralPath $assetDir -Recurse -File | Where-Object { $_.Name -like "scrumboy-*-windows-amd64.exe" })
          $shaFiles = @(Get-ChildItem -LiteralPath $assetDir -Recurse -File | Where-Object { $_.Name -like "scrumboy-*-windows-amd64.exe.sha256" })

          if ($exeFiles.Count -ne 1) {
            throw "Expected exactly one Windows executable artifact, found $($exeFiles.Count)."
          }
          if ($shaFiles.Count -ne 1) {
            throw "Expected exactly one checksum artifact, found $($shaFiles.Count)."
          }

          $exePath = $exeFiles[0].FullName
          $shaPath = $shaFiles[0].FullName
          $provenancePath = "$exePath.intoto.jsonl"

          "exe_path=$exePath" >> $env:GITHUB_OUTPUT
          "sha_path=$shaPath" >> $env:GITHUB_OUTPUT
          "provenance_path=$provenancePath" >> $env:GITHUB_OUTPUT

      - name: Attest Windows executable
        id: attest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ steps.resolve.outputs.exe_path }}

      - name: Export provenance bundle
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          EXE_PATH: ${{ steps.resolve.outputs.exe_path }}
          PROVENANCE_PATH: ${{ steps.resolve.outputs.provenance_path }}
        run: |
          $ErrorActionPreference = "Stop"

          $exportDir = Join-Path $env:RUNNER_TEMP "attestation-export"
          Remove-Item -LiteralPath $exportDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $exportDir -Force | Out-Null
          Set-Location -LiteralPath $exportDir

          gh attestation download "$env:EXE_PATH" `
            -R "$env:GH_REPO" `
            --predicate-type "https://slsa.dev/provenance/v1"

          $bundleFiles = @(Get-ChildItem -LiteralPath $exportDir -File | Where-Object {
            $_.Name -like "sha256-*.jsonl" -or $_.Name -like "sha256:*.jsonl"
          })
          if ($bundleFiles.Count -ne 1) {
            throw "Expected exactly one attestation bundle from gh attestation download, found $($bundleFiles.Count)."
          }

          $bundlePath = $bundleFiles[0].FullName
          if ((Get-Item -LiteralPath $bundlePath).Length -le 0) {
            throw "Attestation bundle '$bundlePath' is empty."
          }

          Copy-Item -LiteralPath $bundlePath -Destination $env:PROVENANCE_PATH -Force
          if (-not (Test-Path -LiteralPath $env:PROVENANCE_PATH -PathType Leaf)) {
            throw "Provenance file was not created at '$env:PROVENANCE_PATH'."
          }
          if ((Get-Item -LiteralPath $env:PROVENANCE_PATH).Length -le 0) {
            throw "Provenance file '$env:PROVENANCE_PATH' is empty."
          }
          if (-not $env:PROVENANCE_PATH.EndsWith(".intoto.jsonl")) {
            throw "Provenance filename must end with .intoto.jsonl."
          }

          gh attestation verify "$env:EXE_PATH" `
            -R "$env:GH_REPO" `
            --bundle "$env:PROVENANCE_PATH" `
            --predicate-type "https://slsa.dev/provenance/v1" `
            --signer-workflow "$env:GH_REPO/.github/workflows/windows-exe-release.yml" `
            --deny-self-hosted-runners

      - name: Attach assets to existing release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          EXE_PATH: ${{ steps.resolve.outputs.exe_path }}
          SHA_PATH: ${{ steps.resolve.outputs.sha_path }}
          PROVENANCE_PATH: ${{ steps.resolve.outputs.provenance_path }}
        run: |
          $ErrorActionPreference = "Stop"

          foreach ($path in @($env:EXE_PATH, $env:SHA_PATH, $env:PROVENANCE_PATH)) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Required release asset missing: '$path'."
            }
          }

          $provenanceFiles = @(Get-ChildItem -LiteralPath (Split-Path -Parent $env:PROVENANCE_PATH) -File | Where-Object {
            $_.Name -like "scrumboy-*-windows-amd64.exe.intoto.jsonl"
          })
          if ($provenanceFiles.Count -ne 1) {
            throw "Expected exactly one provenance bundle, found $($provenanceFiles.Count)."
          }

          gh release upload "$env:RELEASE_TAG" `
            "$env:EXE_PATH" `
            "$env:SHA_PATH" `
            "$env:PROVENANCE_PATH" `
            --clobber
