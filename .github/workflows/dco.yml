name: DCO Check

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check DCO sign-offs
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          mapfile -t commits < <(
            git rev-list --reverse "${BASE_SHA}..${HEAD_SHA}"
          )

          if (( ${#commits[@]} == 0 )); then
            echo "No commits found in pull request."
            exit 0
          fi

          failures=0

          for commit in "${commits[@]}"; do
            author_name="$(git show -s --format='%an' "$commit")"
            author_email="$(git show -s --format='%ae' "$commit")"
            expected="${author_name} <${author_email}>"
            matched=false

            mapfile -t signoffs < <(
              git show -s --format='%B' "$commit" |
                git interpret-trailers --parse |
                sed -nE 's/^Signed-off-by:[[:space:]]*//Ip'
            )

            for signoff in "${signoffs[@]}"; do
              if [[ "${signoff,,}" == "${expected,,}" ]]; then
                matched=true
                break
              fi
            done

            if [[ "$matched" == true ]]; then
              echo "PASS ${commit:0:12} ${expected}"
            else
              echo "::error title=DCO sign-off missing::Commit ${commit:0:12} must contain: Signed-off-by: ${expected}"
              failures=$((failures + 1))
            fi
          done

          if (( failures > 0 )); then
            echo "DCO check failed for ${failures} commit(s)."
            exit 1
          fi

          echo "DCO check passed for ${#commits[@]} commit(s)."